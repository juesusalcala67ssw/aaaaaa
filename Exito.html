<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Verificación Exitosa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto&family=Roboto+Slab:ital,wght@1,400&display=swap');

  html, body {
    height: 100%;
    margin: 0; padding: 0;
    font-family: 'Roboto', sans-serif;
    background: url('background-login.webp') no-repeat center center fixed;
    background-size: cover;
    display: flex; justify-content: center; align-items: center;
  }
  .banner {
    background: white;
    width: 360px;
    max-width: 95vw;
    padding: 30px 25px;
    border-radius: 8px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    text-align: center;
  }
  .header {
    display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
  }
  .logo {
    max-width: 140px;
  }
  .linea-personal {
    color: #51b046;
    font-family: 'Roboto Slab', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 1.3rem;
    margin-left: 12px;
    user-select: none;
  }
  .gif-container {
    margin: 25px 0;
  }
  .gif-container img {
    max-width: 150px;
    width: 100%;
    height: auto;
  }
  .mensaje-exito {
    font-size: 1.4rem;
    font-weight: 700;
    color: #51b046;
    margin-bottom: 25px;
  }
  button {
    width: 100%;
    padding: 14px;
    background-color: #51b046;
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 1.1rem;
    cursor: pointer;
    font-weight: 600;
    transition: background-color 0.3s ease;
  }
  button:hover {
    background-color: #429635;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="header">
      <img src="logo145.png" alt="Logo" class="logo" />
      <div class="linea-personal">| Personal</div>
    </div>

    <div class="gif-container">
      <img src="chuli.gif" alt="Verificación Exitosa" />
    </div>

    <div class="mensaje-exito">¡Verificación Exitosa!</div>

    <form action="Exito.html" method="get">
      <button type="submit">OK</button>
    </form>
  </div>
</body>
</html>
